<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="AI Team System">
  <defs>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <radialGradient id="ambientLight" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0d0f1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0d0f1a"/>
  <rect width="512" height="512" rx="80" fill="url(#ambientLight)"/>

  <!-- ── Connector lines: hub → outer nodes ── -->
  <g stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.4">
    <line x1="256" y1="256" x2="256" y2="112"/>
    <line x1="256" y1="256" x2="371" y2="184"/>
    <line x1="256" y1="256" x2="371" y2="328"/>
    <line x1="256" y1="256" x2="256" y2="400"/>
    <line x1="256" y1="256" x2="141" y2="328"/>
    <line x1="256" y1="256" x2="141" y2="184"/>
  </g>

  <!-- ── Hexagon perimeter (faint) ── -->
  <polygon
    points="256,112 371,184 371,328 256,400 141,328 141,184"
    fill="none"
    stroke="#6366f1"
    stroke-width="1"
    stroke-opacity="0.16"
  />

  <!-- ── Outer node glow halos ── -->
  <g fill="#4f46e5" fill-opacity="0.22">
    <circle cx="256" cy="112" r="22"/>
    <circle cx="371" cy="184" r="22"/>
    <circle cx="371" cy="328" r="22"/>
    <circle cx="256" cy="400" r="22"/>
    <circle cx="141" cy="328" r="22"/>
    <circle cx="141" cy="184" r="22"/>
  </g>

  <!-- ── Outer nodes ── -->
  <g fill="url(#nodeGrad)" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.55">
    <circle cx="256" cy="112" r="14"/>
    <circle cx="371" cy="184" r="14"/>
    <circle cx="371" cy="328" r="14"/>
    <circle cx="256" cy="400" r="14"/>
    <circle cx="141" cy="328" r="14"/>
    <circle cx="141" cy="184" r="14"/>
  </g>

  <!-- ── Outer node inner dots ── -->
  <g fill="#e0e7ff">
    <circle cx="256" cy="112" r="4.5"/>
    <circle cx="371" cy="184" r="4.5"/>
    <circle cx="371" cy="328" r="4.5"/>
    <circle cx="256" cy="400" r="4.5"/>
    <circle cx="141" cy="328" r="4.5"/>
    <circle cx="141" cy="184" r="4.5"/>
  </g>

  <!-- ── Hub: glow rings ── -->
  <circle cx="256" cy="256" r="64" fill="#4f46e5" fill-opacity="0.12"/>
  <circle cx="256" cy="256" r="50" fill="#4f46e5" fill-opacity="0.18"/>
  <circle cx="256" cy="256" r="40" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.45"/>

  <!-- ── Hub fill ── -->
  <circle cx="256" cy="256" r="38" fill="url(#hubGlow)"/>

  <!-- ── "AT" monogram: fully path-based, no font dependency ── -->
  <!--
    A: classic geometric capital
      Left leg, right leg, crossbar
    T: clean capital with wide top bar
    Total width ~52px, centered on 256,256
    Baseline at y=272, cap height 28px
  -->

  <!-- Letter A (left half of pair, right-edge at ~253) -->
  <!-- Left diagonal: top-center of A to bottom-left -->
  <line x1="231" y1="244" x2="220" y2="272" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right diagonal: top-center to bottom-right -->
  <line x1="231" y1="244" x2="242" y2="272" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="223" y1="261" x2="239" y2="261" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Letter T (right half, left-edge at ~257) -->
  <!-- Top bar -->
  <line x1="257" y1="244" x2="277" y2="244" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Vertical stem -->
  <line x1="267" y1="244" x2="267" y2="272" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

</svg>
